{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "osm.fullname" . | printf "%s-secret") }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "osm.fullname" . }}-secret
  labels:
    {{- include "osm.labels" . | nindent 4 }}
data:
  OSM_DATABASE_COMMONKEY: {{ if $existing }}{{ index $existing.data "OSM_DATABASE_COMMONKEY" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
  OSM_MYSQL_ROOT_PASSWORD: {{ if $existing }}{{ index $existing.data "OSM_MYSQL_ROOT_PASSWORD" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
  OSM_KEYSTONE_DB_PASSWORD: {{ if $existing }}{{ index $existing.data "OSM_KEYSTONE_DB_PASSWORD" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
  OSM_SERVICE_PASSWORD: {{ if $existing }}{{ index $existing.data "OSM_SERVICE_PASSWORD" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
  OSM_DATABASE_URI: {{ include "osm.databaseUri" . }}