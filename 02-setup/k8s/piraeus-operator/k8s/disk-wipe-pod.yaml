apiVersion: v1
kind: Pod
metadata:
  name: disk-wipe
  namespace: piraeus-operator
spec:
  nodeName: setup02-x11spl-f-worker-1
  hostPID: true
  containers:
  - name: wipe
    image: ubuntu
    securityContext:
      privileged: true
    # Destroys the ZFS pool (if active) via host namespace, then wipes the partition.
    # Required when linstor/ZFS previously used the disk — labels at both ends of the
    # partition keep the pool "active" even after a partial dd wipe.
    command:
    - sh
    - -c
    - |
      apt-get update -qq && apt-get install -y -qq zfsutils-linux 2>/dev/null
      POOL=$(nsenter --mount=/proc/1/ns/mnt -- zpool list -H -o name 2>/dev/null | head -1)
      if [ -n "$POOL" ]; then
        nsenter --mount=/proc/1/ns/mnt -- zpool destroy "$POOL" && echo "Destroyed pool: $POOL"
      fi
      dd if=/dev/zero of=/dev/sdb7 bs=1M count=10
      echo DONE
    volumeMounts:
    - name: dev
      mountPath: /dev
  volumes:
  - name: dev
    hostPath:
      path: /dev
  restartPolicy: Never
