nodeSelector:
  node.kubernetes.io/location: edge
tolerations:
- key: node.kubernetes.io/location
  operator: Equal
  value: edge
  effect: NoSchedule

controller:
  podTemplate:
    spec:
      nodeSelector:
        node.kubernetes.io/location: cloud
      tolerations:
      - key: node.kubernetes.io/location
        operator: Equal
        value: cloud
        effect: NoSchedule

csiController:
  podTemplate:
    spec:
      nodeSelector:
        node.kubernetes.io/location: cloud
      tolerations:
      - key: node.kubernetes.io/location
        operator: Equal
        value: cloud
        effect: NoSchedule

affinityController:
  podTemplate:
    spec:
      nodeSelector:
        node.kubernetes.io/location: cloud
      tolerations:
      - key: node.kubernetes.io/location
        operator: Equal
        value: cloud
        effect: NoSchedule

nfsServer:
  enabled: false

