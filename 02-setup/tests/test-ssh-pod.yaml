apiVersion: v1
kind: Pod
metadata:
  name: ssh-client
  annotations:
    k8s.v1.cni.cncf.io/networks: mgmtnet-subnet-0-netattach
    mgmtnet-subnet-0-netattach.kube-vim.ovn.kubernetes.io/logical_switch: mgmtnet-subnet-0
spec:
  tolerations:
  - key: node.kubernetes.io/location
    operator: Equal
    value: cloud
    effect: NoSchedule
  containers:
  - name: ssh-client
    image: nicolaka/netshoot:latest
    command: ["sleep", "infinity"]
    stdin: true
    tty: true
  restartPolicy: Never
